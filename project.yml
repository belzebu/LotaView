name: LotaView
options:
  bundleIdPrefix: com.lotalink
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  knownRegions:
    - en
    - zh-Hant
  defaultLangStoryboard: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  LotaView:
    type: application
    platform: iOS
    sources:
      - RTSPViewer
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: VideoToolbox.framework
      - sdk: CoreMedia.framework
      - sdk: Network.framework
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotalink.lotaview
        INFOPLIST_FILE: RTSPViewer/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "1"
    scheme:
      testTargets:
        - LotaViewTests

  LotaView-macOS:
    type: application
    platform: macOS
    sources:
      - RTSPViewer
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: VideoToolbox.framework
      - sdk: CoreMedia.framework
      - sdk: Network.framework
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotalink.lotaview.mac
        PRODUCT_NAME: LotaView
        INFOPLIST_FILE: RTSPViewer/Resources/Info-macOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "1"

  LotaViewTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RTSPViewerTests
    dependencies:
      - target: LotaView
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotalink.lotaview.tests
